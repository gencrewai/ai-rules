# =============================================================================
# cross-verify.yml — L6 AI Cross-Verification Gate
# =============================================================================
# Generated by ai-rules governance adapter.
# Do not edit this file directly.
# Config changes: governance block in profile.yaml → node scripts/sync.mjs --apply
#
# Behavior:
#   1. Triggered on PR open/update
#   2. Read verifier/judge models from .ai-governance/config.yaml
#   3. Each verifier agent independently evaluates PR diff → score + findings
#   4. Judge synthesizes verifier results for final judgment
#   5. Show verdict (PASS/CONDITIONAL/FAIL) as PR check + comment
# =============================================================================

name: AI Cross-Verification

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    branches: [main, master, develop]

# Keep only latest run per PR (prevent duplicate runs)
concurrency:
  group: cross-verify-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cross-verify:
    name: Cross-Verification Gate
    runs-on: ubuntu-latest
    # Skip draft PRs
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
      checks: write
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install runner dependencies
        run: npm install --no-save @anthropic-ai/sdk js-yaml

      - name: Get PR diff
        id: pr-diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} > pr.diff
          echo "diff_lines=$(wc -l < pr.diff)" >> "$GITHUB_OUTPUT"

      - name: Run cross-verification
        id: cross-verify
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/cross-verify-runner.mjs

      - name: Post verification result to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            let result
            try {
              result = JSON.parse(fs.readFileSync('cross-verify-result.json', 'utf8'))
            } catch (e) {
              result = { verdict: 'ERROR', summary: 'Failed to read cross-verify-result.json: ' + e.message }
            }

            const verdictEmoji = {
              PASS: '✅',
              CONDITIONAL: '⚠️',
              FAIL: '❌',
              ERROR: '🔴',
            }[result.verdict] || '❓'

            const body = [
              `## ${verdictEmoji} AI Cross-Verification — ${result.verdict}`,
              '',
              result.summary || '',
              '',
              ...(result.verifier_results || []).map(v =>
                `### ${v.agent_id} (${v.score ?? '?'}/100)\n${v.comment || ''}`
              ),
              '',
              result.judge_comment ? `### Final Judgment Rationale\n${result.judge_comment}` : '',
              '',
              `<sub>powered by ai-rules governance · ${new Date().toISOString()}</sub>`,
            ].filter(l => l !== undefined).join('\n')

            // Find existing bot comment and update (create new if not found)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            })
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('AI Cross-Verification')
            )
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              })
            }

      - name: Set check status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            let result
            try {
              result = JSON.parse(fs.readFileSync('cross-verify-result.json', 'utf8'))
            } catch (e) {
              result = { verdict: 'ERROR' }
            }

            const conclusion = {
              PASS: 'success',
              CONDITIONAL: 'neutral',   // Warning but does not block merge
              FAIL: 'failure',
              ERROR: 'failure',
            }[result.verdict] || 'failure'

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'AI Cross-Verification',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion,
              output: {
                title: `Cross-Verification: ${result.verdict}`,
                summary: result.summary || '',
              },
            })
